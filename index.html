<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Bullion Rates</title>
    <style>
        body { background-color: #0f0f0f; color: #ffd700; font-family: 'Segoe UI', sans-serif; text-align: center; }
        .container { margin-top: 50px; }
        .price-box { 
            display: inline-block; border: 2px solid #ffd700; padding: 30px; 
            margin: 15px; border-radius: 15px; min-width: 200px;
            background: #1a1a1a; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .price { font-size: 3em; font-weight: bold; display: block; }
        .label { color: #ffffff; text-transform: uppercase; letter-spacing: 2px; }
        #status { color: #888; margin-top: 20px; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="container">
        <h1>BULLION LIVE</h1>
        <div id="prices-container">
            <p>Connecting to Live Feed...</p>
        </div>
        <p id="status">Syncing with Google Sheets...</p>
    </div>

    <script>
        // PASTE YOUR WEB APP URL HERE
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbw7H341oKecHtNlp6VMjJDDFzpM8ljJ7JGFRmCb9TZfw6bHh8AHpFyu6YTfgvQddR8q6Q/exec";

        async function updateDashboard() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.json();
                
                // Assuming Row 1 has headers, Row 2 is Gold, Row 3 is Silver
                // data[Row][Column] -> Row 1 is index 0, Col A is index 0
                
                let goldPrice = data[1][1]; // Cell B2
                let silverPrice = data[2][1]; // Cell B3

                document.getElementById('prices-container').innerHTML = `
                    <div class="price-box">
                        <span class="label">Gold 995</span>
                        <span class="price">₹${goldPrice}</span>
                    </div>
                    <div class="price-box">
                        <span class="label">Silver Spot</span>
                        <span class="price">₹${silverPrice}</span>
                    </div>
                `;
                
                document.getElementById('status').innerText = "Last Updated: " + new Date().toLocaleTimeString();
            } catch (err) {
                document.getElementById('status').innerText = "Error fetching data. Retrying...";
            }
        }

        // Refresh every 60 seconds (60000 ms)
        setInterval(updateDashboard, 60000);
        updateDashboard(); // Initial load
    </script>
</body>
</html>
