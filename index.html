<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bullion Live - Full Data Feed</title>
    <style>
        /* Dark Professional Theme */
        body { background-color: #0d0d0d; color: #ffd700; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 700px; margin: auto; }
        h1 { text-align: center; border-bottom: 2px solid #333; padding-bottom: 15px; letter-spacing: 2px; }
        
        /* Table Styling for All Data */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #161616; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        th, td { border-bottom: 1px solid #222; padding: 15px; text-align: left; }
        th { background-color: #222; color: #888; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        
        .row-label { color: #aaa; font-size: 0.9rem; font-weight: 500; }
        .row-value { color: #ffffff; font-size: 1.1rem; font-weight: bold; text-align: right; }
        
        /* Status Bar */
        #status-bar { text-align: center; margin-top: 30px; font-size: 0.8rem; color: #444; border-top: 1px solid #222; padding-top: 15px; }
        .live-dot { height: 8px; width: 8px; background-color: #00ff00; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 5px #00ff00; }
    </style>
</head>
<body>

    <div class="container">
        <h1>BULLION LIVE FEED</h1>
        
        <table id="main-table">
            <thead>
                <tr>
                    <th>Description</th>
                    <th style="text-align: right;">Current Rate / Value</th>
                </tr>
            </thead>
            <tbody id="data-body">
                <tr><td colspan="2" style="text-align:center; padding: 50px;">Connecting to Sheet 1...</td></tr>
            </tbody>
        </table>

        <div id="status-bar">
            <span class="live-dot"></span> System Live | <span id="sync-time">Synchronizing...</span>
        </div>
    </div>

    <script>
        // Your current Web App URL
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbyE3a8fCvHt8AwUEBkgqpSxzDgS3ZhTUgSIqGkgZ22ouKCbmdu0cp8sQ9tcY4yI7IzqyA/exec";

        // This function processes the data dump from Sheet 1
        function handleData(data) {
            let html = "";
            
            data.forEach((row) => {
                // If the first column has a label, show the row
                if (row[0] && row[0].toString().trim() !== "") {
                    
                    let val = row[1] || "---";
                    
                    // Cleanup for weird date formatting if necessary
                    if (row[0].toString().includes("Date") && val.toString().includes("T")) {
                        val = val.split("T")[0];
                    }

                    html += `
                        <tr>
                            <td class="row-label">${row[0]}</td>
                            <td class="row-value">${val} ${row[2] || ""}</td>
                        </tr>
                    `;
                }
            });

            document.getElementById('data-body').innerHTML = html;
            document.getElementById('sync-time').innerText = "Last Sync: " + new Date().toLocaleTimeString();
        }

        function requestUpdate() {
            // JSONP Technique to bypass Incognito/CORS blocks
            const script = document.createElement('script');
            script.src = GOOGLE_URL + "?callback=handleData&t=" + new Date().getTime();
            document.body.appendChild(script);
            script.onload = () => script.remove();
        }

        // Auto-refresh every 30 seconds
        setInterval(requestUpdate, 30000);
        
        // Initial load
        requestUpdate();
    </script>
</body>
</html>
