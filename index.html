<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Bullion Feed</title>
    <style>
        /* Modern Dark Theme */
        body { background-color: #0d0d0d; color: #ffd700; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        h1 { font-size: 2.2rem; letter-spacing: 2px; margin-bottom: 30px; border-bottom: 2px solid #333; display: inline-block; padding-bottom: 10px; }
        
        /* Grid Layout for Prices */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.3s; }
        .card:hover { border-color: #ffd700; transform: translateY(-5px); }
        
        /* Typography */
        .label { color: #888; font-size: 0.9rem; text-transform: uppercase; display: block; margin-bottom: 10px; }
        .price { font-size: 2rem; font-weight: bold; color: #fff; }
        #timestamp { margin-top: 40px; color: #444; font-style: italic; font-size: 0.85rem; }
        .status-msg { color: #ffd700; font-size: 1.1rem; padding: 50px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>BULLION LIVE FEED</h1>
        
        <div class="grid" id="dashboard">
            <div class="status-msg">Connecting to Live Sheet...</div>
        </div>

        <p id="timestamp">Syncing with Sheet 1...</p>
    </div>

    <script>
        // Your Verified Web App URL
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbyE3a8fCvHt8AwUEBkgqpSxzDgS3ZhTUgSIqGkgZ22ouKCbmdu0cp8sQ9tcY4yI7IzqyA/exec";

        // This function is triggered automatically when Google sends the data
        function handleData(data) {
            function getVal(name) {
                for (let row of data) {
                    // Looks for the name in Column A, returns value from Column B
                    if (row[0] && row[0].toString().toLowerCase().includes(name.toLowerCase())) {
                        return row[1]; 
                    }
                }
                return "---";
            }

            // Define the cards to show
            const items = [
                { label: "Gold Spot", val: getVal("Gold Spot") },
                { label: "Silver Spot", val: getVal("Silver Spot") },
                { label: "USD-INR", val: getVal("USD-INR") },
                { label: "Gold 995 Sell", val: getVal("GOLD 995 SELL") }
            ];

            let html = "";
            items.forEach(item => {
                html += `
                    <div class="card">
                        <span class="label">${item.label}</span>
                        <span class="price">${item.val}</span>
                    </div>
                `;
            });

            document.getElementById('dashboard').innerHTML = html;
            
            // Displays the 'Last Updated' timestamp from your sheet
            const timeVal = getVal("Last Updated");
            document.getElementById('timestamp').innerText = "Last Sheet Sync: " + (timeVal !== "---" ? timeVal : new Date().toLocaleTimeString());
        }

        function requestUpdate() {
            // JSONP Technique: Creates a script tag to bypass CORS security blocks
            const script = document.createElement('script');
            script.src = GOOGLE_URL + "?callback=handleData&t=" + new Date().getTime();
            document.body.appendChild(script);
            
            // Clean up the tag after data is received
            script.onload = () => script.remove();
        }

        // Auto-refresh the website every 60 seconds
        setInterval(requestUpdate, 60000);
        
        // Initial request
        requestUpdate();
    </script>
</body>
</html>
