<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw Data Feed - Bullion</title>
    <style>
        body { background-color: #0d0d0d; color: #ffd700; font-family: monospace; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; text-align: left; border: 1px solid #333; padding: 20px; border-radius: 8px; }
        h1 { text-align: center; border-bottom: 1px solid #ffd700; padding-bottom: 10px; }
        .data-row { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 8px 0; }
        .label { color: #888; font-weight: bold; }
        .value { color: #fff; }
        #status { text-align: center; color: #555; margin-top: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>RAW SHEET DATA</h1>
        <div id="data-list">Initializing connection...</div>
        <div id="status">Syncing with Google Web App...</div>
    </div>

    <script>
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbyE3a8fCvHt8AwUEBkgqpSxzDgS3ZhTUgSIqGkgZ22ouKCbmdu0cp8sQ9tcY4yI7IzqyA/exec";

        // This function handles the "All Data" dump
        function handleData(data) {
            let html = "";
            
            // Loop through every single row in the sheet
            data.forEach(row => {
                // Only show rows that have data in the first or second column
                if (row[0] || row[1]) {
                    html += `
                        <div class="data-row">
                            <span class="label">${row[0] || ""}</span>
                            <span class="value">${row[1] || ""} ${row[2] || ""}</span>
                        </div>
                    `;
                }
            });

            document.getElementById('data-list').innerHTML = html;
            document.getElementById('status').innerText = "Last Updated: " + new Date().toLocaleTimeString();
        }

        function requestUpdate() {
            const script = document.createElement('script');
            // Using your updated URL with the JSONP callback
            script.src = GOOGLE_URL + "?callback=handleData&t=" + new Date().getTime();
            document.body.appendChild(script);
            script.onload = () => script.remove();
        }

        // Refresh every 30 seconds
        setInterval(requestUpdate, 30000);
        requestUpdate();
    </script>
</body>
</html>
