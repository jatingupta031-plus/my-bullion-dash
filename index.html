<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bullion Live - Dashboard</title>
    <style>
        body { background-color: #0d0d0d; color: #ffd700; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: auto; }
        
        /* Header Cards */
        .card-row { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            margin-bottom: 30px; 
        }
        .card { 
            background: #1a1a1a; 
            border: 1px solid #333; 
            padding: 20px; 
            border-radius: 10px; 
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .card-label { color: #888; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .card-value { color: #fff; font-size: 1.6rem; font-weight: bold; }

        /* Full Data Table */
        table { width: 100%; border-collapse: collapse; background: #161616; border-radius: 8px; overflow: hidden; }
        th, td { border-bottom: 1px solid #222; padding: 12px 15px; text-align: left; }
        th { background-color: #222; color: #888; text-transform: uppercase; font-size: 0.7rem; }
        .row-label { color: #aaa; font-size: 0.85rem; }
        .row-value { color: #fff; font-weight: 600; text-align: right; }

        /* Footer Time */
        .footer { 
            margin-top: 30px; 
            padding-top: 15px; 
            border-top: 1px solid #222; 
            text-align: center; 
            color: #555; 
            font-size: 0.85rem; 
        }
        .highlight-time { color: #ffd700; font-weight: bold; }

        @media (max-width: 600px) { .card-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="text-align:center; letter-spacing:2px; margin-bottom:25px;">BULLION LIVE FEED</h2>
        
        <div class="card-row" id="top-cards">
            <div class="card">Loading...</div>
            <div class="card">Loading...</div>
            <div class="card">Loading...</div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Description</th>
                    <th style="text-align: right;">Value</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>

        <div class="footer" id="market-status">
            Market Update: <span class="highlight-time" id="last-update-display">Waiting for sync...</span>
        </div>
    </div>

    <script>
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbyE3a8fCvHt8AwUEBkgqpSxzDgS3ZhTUgSIqGkgZ22ouKCbmdu0cp8sQ9tcY4yI7IzqyA/exec";

        function handleData(data) {
            // Helper to clean up Google's date objects
            function formatVal(val) {
                if (!val) return "---";
                let s = val.toString();
                if (s.includes("T") && s.includes("-") && s.length > 15) {
                    return s.split("T")[0]; // Just the date part
                }
                return s;
            }

            // 1. Fill the 3 Cards (Rows 0, 1, 2)
            let cardHtml = "";
            for (let i = 0; i < 3; i++) {
                if (data[i]) {
                    cardHtml += `
                        <div class="card">
                            <span class="card-label">${data[i][0]}</span>
                            <span class="card-value">${data[i][1]}</span>
                        </div>
                    `;
                }
            }
            document.getElementById('top-cards').innerHTML = cardHtml;

            // 2. Fill the Table (Remaining rows)
            let tableHtml = "";
            let updateDate = "";
            let updateTime = "";

            data.forEach((row, index) => {
                // Skip the first 3 (already in cards)
                if (index > 2 && row[0]) {
                    // Catch the update time rows specifically for the footer
                    if (row[0].includes("Date")) updateDate = formatVal(row[1]);
                    else if (row[0].includes("Time")) updateTime = row[1];
                    else {
                        tableHtml += `
                            <tr>
                                <td class="row-label">${row[0]}</td>
                                <td class="row-value">${row[1]}</td>
                            </tr>
                        `;
                    }
                }
            });

            document.getElementById('table-body').innerHTML = tableHtml;
            
            // 3. Fix the Footer Display
            document.getElementById('last-update-display').innerText = updateDate + " | " + updateTime;
        }

        function requestUpdate() {
            const script = document.createElement('script');
            script.src = GOOGLE_URL + "?callback=handleData&t=" + new Date().getTime();
            document.body.appendChild(script);
            script.onload = () => script.remove();
        }

        setInterval(requestUpdate, 30000);
        requestUpdate();
    </script>
</body>
</html>
